name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  # Dummy API keys so pydantic Settings() doesn't fail in CI
  OPENAI_API_KEY: "ci-dummy-key"
  COHERE_API_KEY: "ci-dummy-key"
  DATABASE_URL: "postgresql+psycopg://user:pw@localhost:5432/test_db"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check app/ tests/ --output-format=github

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -m "not integration" -q --tb=short

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/test_api.py tests/test_security.py tests/test_config_validation.py -q --tb=short
