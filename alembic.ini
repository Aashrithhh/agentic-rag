# Alembic configuration for per-case database migrations.
#
# Usage:
#   alembic -x case_id=big-thorium upgrade head
#   alembic -x case_id=big-thorium current
#   python scripts/migrate_all.py          # migrate ALL cases
#
# The actual database URL is constructed at runtime from case_id
# (see alembic/env.py), so sqlalchemy.url below is just a placeholder.

[alembic]
script_location = alembic
sqlalchemy.url = postgresql+psycopg://user:password@localhost:5432/audit_rag

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
